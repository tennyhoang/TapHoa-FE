# =============================================================================
# CI/CD Pipeline — TapHoa Frontend  (Next.js → Vercel)
# =============================================================================
#
# LUỒNG KIỂM DUYỆT:
#
#   [dev]          push → CI + CD Development (tự động)
#   [staging]      push → CI + CD Staging     (sau khi PR dev→staging merge)
#   [main] PR mở  →       CI only             (build check để Leader review)
#   [main] PR merge→      CI + CD Production  (sau khi Leader Approve + Merge)
#
# =============================================================================
# CÀI ĐẶT BẮT BUỘC TRƯỚC KHI SỬ DỤNG
# =============================================================================
#
# A. ĐỔI DEFAULT BRANCH TRÊN GITHUB (Settings → Branches):
#    Đổi default branch từ 'master' sang 'main'
#    (Sau đó có thể xóa nhánh 'master' cũ)
#
# B. BRANCH PROTECTION RULES (Settings → Branches → Add rule):
#
#    Rule cho nhánh [main]:
#      ✅ Require a pull request before merging
#         └ Require approvals: 1          ← Leader phải bấm Approve
#      ✅ Require status checks to pass
#         └ Status check: "CI — Build & Lint"   ← CI xanh mới được merge
#      ✅ Do not allow bypassing the above settings
#         └ Không ai được push thẳng vào main, kể cả admin
#
#    Rule cho nhánh [staging]:
#      ✅ Require a pull request before merging
#      ✅ Require status checks: "CI — Build & Lint"
#
# C. GITHUB ENVIRONMENTS (Settings → Environments):
#
#    Tạo 3 environments: Development | Staging | Production
#
#    Environment [Production] — thêm tầng bảo vệ bổ sung:
#      ✅ Required reviewers: [GitHub username của Leader]
#         → Sau khi PR merge vào main, GitHub sẽ PAUSE job CD và
#           gửi email cho Leader. Leader phải vào GitHub Actions UI
#           bấm "Review deployments → Approve" thì CD mới chạy.
#      ✅ Deployment branches: chỉ cho phép nhánh 'main'
#
# D. SECRETS CẦN THÊM VÀO TỪNG ENVIRONMENT:
#
#    Mỗi environment tương ứng với 1 project Vercel RIÊNG BIỆT.
#    VERCEL_PROJECT_ID phải là ID của đúng project đó, không dùng chung.
#
#    Environment `Development`:
#      • VERCEL_TOKEN        — Vercel API token (lấy từ vercel.com/account/tokens)
#      • VERCEL_ORG_ID       — ID tổ chức trên Vercel (dùng chung)
#      • VERCEL_PROJECT_ID   — ID của Vercel project Dev
#      • NEXT_PUBLIC_API_URL = https://dev-api.taphoa.vn
#
#    Environment `Staging`:
#      • VERCEL_TOKEN        — (dùng chung)
#      • VERCEL_ORG_ID       — (dùng chung)
#      • VERCEL_PROJECT_ID   — ID của Vercel project Staging  ← khác với Dev
#      • NEXT_PUBLIC_API_URL = https://staging-api.taphoa.vn
#
#    Environment `Production`:
#      • VERCEL_TOKEN        — (dùng chung)
#      • VERCEL_ORG_ID       — (dùng chung)
#      • VERCEL_PROJECT_ID   — ID của Vercel project Production  ← khác với Dev/Staging
#      • NEXT_PUBLIC_API_URL = https://api.taphoa.vn
#
# =============================================================================

name: CI/CD — TapHoa FE

on:
  # Trigger khi push vào 3 nhánh chính
  # • dev:     CI + CD Development  (push trực tiếp)
  # • staging: CI + CD Staging      (khi PR dev→staging được merge)
  # • main:    CI + CD Production   (khi PR staging/dev→main được merge)
  push:
    branches: [dev, staging, main]

  # Trigger khi có Pull Request nhắm vào staging hoặc main
  # → Chỉ chạy job CI để kiểm tra code, KHÔNG chạy bất kỳ job CD nào
  # → Leader dùng kết quả CI này để Approve hoặc Request Changes
  pull_request:
    branches: [staging, main]
    types: [opened, synchronize, reopened]

# Hủy run cũ khi có commit mới trên cùng nhánh/PR (tránh lãng phí CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ===========================================================================
  # JOB 1 — CI: Build Check (chạy với MỌI trigger)
  # ===========================================================================
  # Mục đích: Đảm bảo code luôn biên dịch được trước khi merge hoặc deploy.
  # Tất cả job CD đều phụ thuộc job này (needs: ci) — CI fail thì CD không chạy.
  # ===========================================================================
  ci:
    name: CI — Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (TypeScript)
        run: npx tsc --noEmit

      - name: Build
        # NEXT_PUBLIC_API_URL dùng placeholder ở bước CI để build luôn thành công
        # dù secrets chưa được inject (trường hợp PR từ fork hoặc CI độc lập)
        # URL thật sẽ được inject ở từng job CD bên dưới thông qua GitHub Environment
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://api-placeholder.taphoa.vn' }}


  # ===========================================================================
  # JOB 2 — CD Development: Deploy ngay khi push vào nhánh 'dev'
  # ===========================================================================
  deploy-dev:
    name: CD — Deploy to Development
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: ci
    runs-on: ubuntu-latest
    environment: Development   # Tên phải khớp CHÍNH XÁC với GitHub Environment (case-sensitive)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel (Development preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token:      ${{ secrets.GITHUB_TOKEN }}
          vercel-version:    'latest'
          # Không có --prod: Vercel tạo preview URL, không ảnh hưởng production
          vercel-args: >-
            --env NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}


  # ===========================================================================
  # JOB 3 — CD Staging: Deploy khi PR dev→staging được merge
  # ===========================================================================
  deploy-staging:
    name: CD — Deploy to Staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    needs: ci
    runs-on: ubuntu-latest
    environment: Staging       # Tên phải khớp CHÍNH XÁC với GitHub Environment (case-sensitive)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel (Staging preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token:      ${{ secrets.GITHUB_TOKEN }}
          vercel-version:    'latest'
          # Không có --prod: staging vẫn là preview URL, không phải domain chính
          vercel-args: >-
            --env NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}


  # ===========================================================================
  # JOB 4 — CD Production: Deploy CHỈ khi PR được merge vào 'main'
  # ===========================================================================
  # Tại sao đây là an toàn?
  #   • Branch protection chặn push trực tiếp vào main
  #   • Push vào main CHỈ xảy ra khi PR staging/dev→main được Approve + Merge
  #   • job này không chạy khi PR đang mở (pull_request event)
  #   • GitHub Environment 'Production' với Required Reviewers = tầng chặn thêm
  # ===========================================================================
  deploy-production:
    name: CD — Deploy to Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    environment: Production    # Tên phải khớp CHÍNH XÁC với GitHub Environment (case-sensitive)
                               # + chặn deploy nếu 'Required reviewers' chưa approve

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token:      ${{ secrets.GITHUB_TOKEN }}
          vercel-version:    'latest'
          # --prod: deploy lên production domain thật, không phải preview URL
          vercel-args: >-
            --prod
            --env NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
